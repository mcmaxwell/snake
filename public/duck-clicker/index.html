<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Frog Clicker</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <a class="home-link" href="/">Home</a>
    <h1>The Frog Clicker</h1>
    <p class="subtitle">Tap the frog. Grow your clicks.</p>

    <section class="layout">
      <section class="game-panel" aria-live="polite">
        <div class="scoreboard">
          <div class="score-card">
            <span class="label">Amount of Clicks</span>
            <span id="score" class="value">0</span>
          </div>
          <div class="score-card">
            <span class="label">Clicks Per Second</span>
            <span id="cps" class="value">0</span>
          </div>
          <div class="score-card">
            <span class="label">Per Click</span>
            <span id="power" class="value">1</span>
          </div>
        </div>

        <button id="duck-button" class="duck-button" type="button" aria-label="Click frog">
          <span id="duck-sprite" class="duck" aria-hidden="true"></span>
        </button>
      </section>

      <section class="upgrades upgrades-panel" aria-label="Upgrades">
        <h2>Upgrades</h2>
        <button id="upgrade-click" class="upgrade-button" type="button">
          Buy Upgrade (Cost: 50) - 2 per click
        </button>
        <p id="upgrade-status" class="upgrade-status">Save up 50 clicks to boost tap power.</p>

        <button id="upgrade-auto" class="upgrade-button" type="button">
          Buy Auto Frog (Cost: 75) - 1 click/sec
        </button>
        <p id="upgrade-auto-status" class="upgrade-status">Save up 75 clicks for auto clicking.</p>
      </section>
    </section>
  </main>

  <script src="./game.js"></script>
</body>
</html>
